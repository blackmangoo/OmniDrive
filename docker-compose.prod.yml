services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: omnidrive-api-prod
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    volumes:
      # Read-only mount for models (no dynamic updates)
      - ./api/models:/app/models:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: always
    networks:
      - omnidrive-network
    # Production: no reload, increased worker threads
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 4

networks:
  omnidrive-network:
    driver: bridge
