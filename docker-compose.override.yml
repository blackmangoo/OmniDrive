# Override file for development with hot reload
# Usage: docker-compose -f docker-compose.yml -f docker-compose.override.yml up

services:
  api:
    # Enable hot reload by mounting source code
    volumes:
      - ./api:/app
    # Use uvicorn's reload feature for development
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
