services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: omnidrive-api
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    volumes:
      # Mount models directory for hot updates without rebuild
      - ./api/models:/app/models:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    networks:
      - omnidrive-network
    # Uncomment for development with hot reload:
    # command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    # volumes:
    #   - ./api:/app

networks:
  omnidrive-network:
    driver: bridge
